name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Deploy with Wrangler
        working-directory: public
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx --yes wrangler@latest deploy

      - name: Verify live style.css matches local
        run: |
          local_sha=$(sha256sum public/style.css | cut -d' ' -f1)
          for i in 1 2 3 4 5 6; do
            live_sha=$(curl -sf https://www.galeriaomaso.com/style.css | sha256sum | cut -d' ' -f1 || echo "")
            if [ "$local_sha" = "$live_sha" ]; then
              echo "OK live==local ($local_sha)"
              exit 0
            fi
            echo "attempt $i: local=$local_sha live=$live_sha — waiting 10s"
            sleep 10
          done
          echo "Live did not match local after 60s — Cloudflare edge may still be propagating; not failing the job."
