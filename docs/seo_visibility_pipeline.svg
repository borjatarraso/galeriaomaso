<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 780" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#475569"/>
    </marker>
    <marker id="arrow-accent" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#b45309"/>
    </marker>
    <style>
      .title  { font-size: 24px; font-weight: 700; fill: #0f172a; }
      .sub    { font-size: 14px; fill: #475569; }
      .stage  { font-size: 18px; font-weight: 700; fill: #334155;
                text-transform: uppercase; letter-spacing: 1px; }
      .box-t  { font-size: 15px; font-weight: 700; fill: #0f172a; }
      .box-s  { font-size: 12px; fill: #475569; }
      .pill-t { font-size: 13px; font-weight: 600; fill: #fff; }
      .arrow  { stroke: #475569; stroke-width: 1.8; fill: none; }
      .arrow-accent { stroke: #b45309; stroke-width: 1.8; fill: none; }
      .lane-divider { stroke: #e2e8f0; stroke-width: 1; stroke-dasharray: 3,3; }
    </style>
  </defs>

  <rect x="0" y="0" width="1280" height="780" fill="#fafaf9"/>

  <!-- Title -->
  <text x="640" y="48" class="title" text-anchor="middle">
    Galería O+O — SEO &amp; visibility pipeline
  </text>
  <text x="640" y="72" class="sub" text-anchor="middle">
    From raw post to indexed result · 324 HTML pages · 3 idempotent scripts · 6 distribution channels
  </text>

  <!-- Stage headers -->
  <text x="120"  y="118" class="stage">1 · Content</text>
  <text x="365"  y="118" class="stage">2 · Build</text>
  <text x="640"  y="118" class="stage">3 · Static output</text>
  <text x="930"  y="118" class="stage">4 · Channels</text>
  <text x="1240" y="118" class="stage" text-anchor="end">5 · Audience</text>

  <!-- Lane dividers -->
  <line x1="245"  y1="100" x2="245"  y2="700" class="lane-divider"/>
  <line x1="500"  y1="100" x2="500"  y2="700" class="lane-divider"/>
  <line x1="800"  y1="100" x2="800"  y2="700" class="lane-divider"/>
  <line x1="1060" y1="100" x2="1060" y2="700" class="lane-divider"/>

  <!-- ===== Stage 1 · Content ===== -->
  <g>
    <rect x="40" y="155" width="180" height="80" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="130" y="183" class="box-t" text-anchor="middle">313 posts</text>
    <text x="130" y="205" class="box-s" text-anchor="middle">public/posts/*.html</text>
    <text x="130" y="222" class="box-s" text-anchor="middle">migrated from Blogger</text>

    <rect x="40" y="265" width="180" height="80" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="130" y="293" class="box-t" text-anchor="middle">11 section pages</text>
    <text x="130" y="315" class="box-s" text-anchor="middle">exposiciones · artistas</text>
    <text x="130" y="332" class="box-s" text-anchor="middle">articulos · noticias · …</text>

    <rect x="40" y="375" width="180" height="60" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="130" y="403" class="box-t" text-anchor="middle">images/ assets/</text>
    <text x="130" y="422" class="box-s" text-anchor="middle">long-cached at edge</text>
  </g>

  <!-- ===== Stage 2 · Build (3 scripts) ===== -->
  <g>
    <rect x="270" y="155" width="220" height="125" rx="10"
          fill="#1e3a8a" stroke="#1e3a8a"/>
    <text x="380" y="182" class="pill-t" text-anchor="middle">scripts/seo-transform.py</text>
    <text x="380" y="207" class="box-s" text-anchor="middle" fill="#cbd5e1">title · description</text>
    <text x="380" y="225" class="box-s" text-anchor="middle" fill="#cbd5e1">canonical · OG · Twitter</text>
    <text x="380" y="243" class="box-s" text-anchor="middle" fill="#cbd5e1">JSON-LD @graph:</text>
    <text x="380" y="261" class="box-s" text-anchor="middle" fill="#cbd5e1">Article · Breadcrumb · Event</text>

    <rect x="270" y="300" width="220" height="105" rx="10"
          fill="#0f766e" stroke="#0f766e"/>
    <text x="380" y="327" class="pill-t" text-anchor="middle">scripts/seo-files.py</text>
    <text x="380" y="352" class="box-s" text-anchor="middle" fill="#ccfbf1">sitemap.xml · robots.txt</text>
    <text x="380" y="370" class="box-s" text-anchor="middle" fill="#ccfbf1">_headers · feed.xml</text>
    <text x="380" y="388" class="box-s" text-anchor="middle" fill="#ccfbf1">llms.txt</text>

    <rect x="270" y="425" width="220" height="105" rx="10"
          fill="#b45309" stroke="#b45309"/>
    <text x="380" y="452" class="pill-t" text-anchor="middle">scripts/seo-plus.py</text>
    <text x="380" y="477" class="box-s" text-anchor="middle" fill="#fed7aa">img loading=lazy/eager</text>
    <text x="380" y="495" class="box-s" text-anchor="middle" fill="#fed7aa">preconnect · preload</text>
    <text x="380" y="513" class="box-s" text-anchor="middle" fill="#fed7aa">related-posts block</text>
  </g>

  <!-- Stage 1 → Stage 2 arrows -->
  <path d="M 220 195 L 270 200" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 220 305 L 270 350" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 220 405 L 270 475" class="arrow" marker-end="url(#arrow)"/>

  <!-- ===== Stage 3 · Static output ===== -->
  <g>
    <rect x="520" y="155" width="260" height="110" rx="10"
          fill="#fff" stroke="#1e3a8a" stroke-width="2"/>
    <text x="650" y="182" class="box-t" text-anchor="middle">324 enriched HTML pages</text>
    <text x="650" y="204" class="box-s" text-anchor="middle">unique title + description</text>
    <text x="650" y="222" class="box-s" text-anchor="middle">canonical clean URL</text>
    <text x="650" y="240" class="box-s" text-anchor="middle">OG / Twitter cards + JSON-LD</text>
    <text x="650" y="258" class="box-s" text-anchor="middle">+ ExhibitionEvent on dated posts</text>

    <rect x="520" y="285" width="260" height="95" rx="10"
          fill="#fff" stroke="#0f766e" stroke-width="2"/>
    <text x="650" y="312" class="box-t" text-anchor="middle">Crawl &amp; feed files</text>
    <text x="650" y="334" class="box-s" text-anchor="middle">sitemap.xml (324 URLs)</text>
    <text x="650" y="352" class="box-s" text-anchor="middle">robots.txt · _headers · feed.xml</text>
    <text x="650" y="370" class="box-s" text-anchor="middle">llms.txt (AI assistants)</text>

    <rect x="520" y="400" width="260" height="95" rx="10"
          fill="#fff" stroke="#b45309" stroke-width="2"/>
    <text x="650" y="427" class="box-t" text-anchor="middle">Perf &amp; UX</text>
    <text x="650" y="449" class="box-s" text-anchor="middle">~22 lazy imgs per post</text>
    <text x="650" y="467" class="box-s" text-anchor="middle">logo eager + fetchpriority=high</text>
    <text x="650" y="485" class="box-s" text-anchor="middle">"Exposiciones relacionadas" links</text>
  </g>

  <!-- Stage 2 → Stage 3 arrows -->
  <path d="M 490 210 L 520 210" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 490 350 L 520 330" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 490 475 L 520 445" class="arrow" marker-end="url(#arrow)"/>

  <!-- ===== Stage 4 · Distribution channels ===== -->
  <g>
    <rect x="820" y="155" width="220" height="70" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="930" y="182" class="box-t" text-anchor="middle">Cloudflare edge</text>
    <text x="930" y="202" class="box-s" text-anchor="middle">HTTP/3 · Brotli · 0-RTT</text>
    <text x="930" y="218" class="box-s" text-anchor="middle">long TTL cache · security hdrs</text>

    <rect x="820" y="245" width="220" height="60" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="930" y="272" class="box-t" text-anchor="middle">Google Search Console</text>
    <text x="930" y="292" class="box-s" text-anchor="middle">verified · sitemap submitted</text>

    <rect x="820" y="325" width="220" height="60" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="930" y="352" class="box-t" text-anchor="middle">Bing Webmaster</text>
    <text x="930" y="372" class="box-s" text-anchor="middle">imported from GSC</text>

    <rect x="820" y="405" width="220" height="60" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="930" y="432" class="box-t" text-anchor="middle">Social / messaging</text>
    <text x="930" y="452" class="box-s" text-anchor="middle">FB · X · WhatsApp · LinkedIn</text>

    <rect x="820" y="485" width="220" height="60" rx="8"
          fill="#fff" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="930" y="512" class="box-t" text-anchor="middle">RSS readers</text>
    <text x="930" y="532" class="box-s" text-anchor="middle">Feedly · NewsBlur · Inoreader</text>

    <rect x="820" y="565" width="220" height="60" rx="8"
          fill="#fff" stroke="#b45309" stroke-width="1.5"/>
    <text x="930" y="592" class="box-t" text-anchor="middle">AI assistants</text>
    <text x="930" y="612" class="box-s" text-anchor="middle">Claude · ChatGPT · Perplexity</text>
  </g>

  <!-- Stage 3 → Stage 4 arrows -->
  <path d="M 780 210 L 820 190" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 780 330 L 820 275" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 780 330 L 820 355" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 780 210 L 820 435" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 780 330 L 820 515" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 780 330 L 820 595" class="arrow-accent" marker-end="url(#arrow-accent)"/>

  <!-- ===== Stage 5 · Audience ===== -->
  <g>
    <rect x="1080" y="225" width="170" height="240" rx="10"
          fill="#1e3a8a" stroke="#1e3a8a"/>
    <text x="1165" y="262" class="pill-t" text-anchor="middle">Visitors</text>
    <text x="1165" y="293" class="box-s" text-anchor="middle" fill="#cbd5e1">SERP rich results</text>
    <text x="1165" y="311" class="box-s" text-anchor="middle" fill="#cbd5e1">image-pack hits</text>
    <text x="1165" y="329" class="box-s" text-anchor="middle" fill="#cbd5e1">event listings</text>
    <text x="1165" y="347" class="box-s" text-anchor="middle" fill="#cbd5e1">breadcrumbs in SERP</text>
    <text x="1165" y="365" class="box-s" text-anchor="middle" fill="#cbd5e1">social-card shares</text>
    <text x="1165" y="383" class="box-s" text-anchor="middle" fill="#cbd5e1">RSS subscriptions</text>
    <text x="1165" y="401" class="box-s" text-anchor="middle" fill="#cbd5e1">AI citations</text>
    <text x="1165" y="419" class="box-s" text-anchor="middle" fill="#cbd5e1">direct &amp; referral</text>
    <text x="1165" y="445" class="box-s" text-anchor="middle" fill="#fed7aa" font-weight="700">→ measured in CF</text>
    <text x="1165" y="461" class="box-s" text-anchor="middle" fill="#fed7aa" font-weight="700">Web Analytics</text>
  </g>

  <!-- Stage 4 → Stage 5 arrows -->
  <path d="M 1040 190 L 1080 270" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 1040 275 L 1080 300" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 1040 355 L 1080 330" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 1040 435 L 1080 360" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 1040 515 L 1080 390" class="arrow" marker-end="url(#arrow)"/>
  <path d="M 1040 595 L 1080 420" class="arrow-accent" marker-end="url(#arrow-accent)"/>

  <!-- Footer note -->
  <text x="640" y="735" class="sub" text-anchor="middle">
    Re-run order on content change:  python3 scripts/seo-transform.py  →  scripts/seo-files.py  →  scripts/seo-plus.py
  </text>
  <text x="640" y="755" class="sub" text-anchor="middle">
    All blocks idempotent via &lt;!-- gal-* --&gt; markers · scripts mirror public/ → repo root for git-diff legibility
  </text>
</svg>
